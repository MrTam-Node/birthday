<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 30th Birthday</title>
<meta name="description" content="A small birthday surprise for you.">

<!-- Google Fonts: Space Grotesk for display/UI chrome, Manrope for body text.
     System-font fallback stack is in style.css so it still looks decent offline. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background music: "White" by Kevin MacLeod (incompetech.com), CC BY 4.0
     — see audio/README.txt for the required attribution. Fully invisible,
     no widget: it starts on her first tap/click/keypress, volume swells
     gently as she scrolls. The mini-player below is the play/pause control. -->
<audio id="bg-audio" loop preload="auto">
  <source src="audio/track.mp3" type="audio/mpeg">
</audio>

<!-- Ambient confetti, drifting continuously behind everything — the same
     canvas-based confetti-js effect used in birthday-counter/. -->
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<!-- ============================= 1. OPENING ============================= -->
<header class="cover" id="cover">
  <div class="cover-art" aria-hidden="true">
    <div class="cover-art-glow"></div>
    <div class="cover-art-rings">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="cover-content">
    <p class="live-clock" id="live-clock" aria-live="off">
      <span class="live-dot" aria-hidden="true"></span>
      <span id="live-clock-text">&mdash;</span>
    </p>

    <h1 class="cover-title" id="cover-title">Happy 30th Birthday &#10084;&#65039;</h1>

    <button class="press-play" id="press-play" type="button">
      <span class="press-play-icon" id="press-play-icon" aria-hidden="true">&#9654;</span>
      <span id="press-play-label">Press play</span>
    </button>
  </div>

  <div class="cover-scroll-cue" aria-hidden="true">
    <span>keep scrolling</span>
    <span class="cover-scroll-line"></span>
  </div>
</header>

<main id="tracklist">

  <!-- ============================= 2. MAKE A WISH ============================= -->
  <section class="track" id="section-wish" data-track-name="Make a Wish">
    <div class="track-inner">
      <p class="beat-kicker">make a wish</p>
      <p class="beat-text">Blow out the candle &mdash; tap it, or blow into your mic.</p>

      <div class="cake-wrap">
        <div class="candles" id="candles"></div>
        <div class="cake">
          <div class="cake-tier cake-tier-top"><span class="cake-icing"></span></div>
          <div class="cake-tier cake-tier-bottom"></div>
          <div class="cake-plate"></div>
        </div>
        <div class="confetti-stage" id="confetti-stage" aria-hidden="true"></div>
      </div>

      <div class="track-actions">
        <button class="btn btn-ghost mic-blow-btn" id="mic-blow-btn" type="button">
          <span aria-hidden="true">&#127908;</span>
          <span class="mic-label">Blow into your mic</span>
          <span class="mic-level-bar" aria-hidden="true"><span class="mic-level-fill" id="mic-level-fill"></span></span>
        </button>
      </div>
      <p class="mic-hint" id="mic-hint" hidden>Listening&hellip; take a breath and blow!</p>

      <p class="wish-message" id="wish-message"></p>
    </div>
  </section>

  <!-- ============================= 3. PERSONAL MESSAGE ============================= -->
  <section class="track" id="section-message" data-track-name="A Little Note">
    <div class="track-inner">
      <p class="beat-text" id="message-text"></p>
    </div>
  </section>

  <!-- ============================= 3. ONE MORE THING... ============================= -->
  <section class="track" id="section-tease" data-track-name="One More Thing&hellip;">
    <div class="track-inner">
      <p class="beat-kicker">one more thing&hellip;</p>
      <p class="beat-text" id="tease-text"></p>
    </div>
  </section>

  <!-- ============================= 4. THE SURPRISE (unrevealed) ============================= -->
  <section class="track track-surprise" id="section-surprise" data-track-name="The Surprise">
    <div class="track-inner">
      <p class="beat-text beat-text-emphasis" id="surprise-text"></p>
    </div>
  </section>

  <!-- ============================= 5. CLOSING ============================= -->
  <footer class="outro" id="outro">
    <p class="outro-signature" id="outro-signature">This isn't the last surprise&hellip; &#10084;&#65039;</p>
    <p class="outro-sub" id="outro-sub">Happy 30th, my love.</p>
    <p class="outro-credit">Music: "White" by Kevin MacLeod (incompetech.com), CC BY 4.0</p>
  </footer>

</main>

<!-- ============================= MINI PLAYER (persistent, bottom) ============================= -->
<div class="mini-player" id="mini-player">
  <div class="mini-player-scrub" id="mini-player-scrub" aria-hidden="true">
    <div class="mini-player-scrub-fill" id="mini-player-scrub-fill"></div>
  </div>
  <div class="mini-player-row">
    <div class="mini-player-art" aria-hidden="true">
      <div class="mini-player-art-glow"></div>
    </div>
    <div class="mini-player-info">
      <p class="mini-player-track" id="mini-player-track">01</p>
      <p class="mini-player-name" id="mini-player-name">Opening</p>
    </div>
    <button class="mini-player-btn" id="mini-player-btn" type="button" aria-label="Play music" aria-pressed="false">
      <span class="mini-player-play-icon" id="mini-player-play-icon" aria-hidden="true">&#9654;</span>
      <span class="mini-player-bars" aria-hidden="true"><span></span><span></span><span></span></span>
    </button>
  </div>
</div>

<script src="confetti.min.js"></script>
<script src="script.js"></script>
</body>
</html>
